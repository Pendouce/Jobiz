services:
  nginx:
    image: nginx:1.30.2-alpine3.23-slim
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    networks:
      - jobizNetwork

  php:
    build: ./docker/php
    container_name: php
    volumes:
      - .:/var/www/html
    command: sh -c "composer dump-autoload && php-fpm"
    networks:
      - jobizNetwork
  db:
    image: mysql:8.0
    container_name: bdd
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
    volumes:
      - data_db:/var/lib/mysql
    networks:
      - jobizNetwork

  pma:
    image: phpmyadmin:5.2.3
    container_name: phpMyAdmin
    ports:
      - "8080:80"
    environment:
      PMA_HOST: db
    depends_on:
      - db
    restart: always
    networks:
      - jobizNetwork

volumes:
  data_db:
networks:
  jobizNetwork:
